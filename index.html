<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SQLVault — 50 LeetCode SQL Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">SQL<span>Vault</span></div>
  <div class="nav-sep"></div>
  <div class="nav-stats">
    <div class="ns">Total <b id="st" style="color:var(--text)">0</b></div>
    <div class="ns">Easy <b class="e" id="se">0</b></div>
    <div class="ns">Medium <b class="m" id="sm">0</b></div>
    <div class="ns">Hard <b class="h" id="sh">0</b></div>
  </div>
  <button class="theme-btn" id="theme-btn">
    <svg id="theme-icon" class="t-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <span id="theme-label">Light</span>
  </button>
</nav>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-ctrl">
      <div class="sw">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="srch" placeholder="Search title, #id or tag…"/>
      </div>
      <div class="frow">
        <button class="fb fa" data-f="all">All</button>
        <button class="fb"    data-f="easy">Easy</button>
        <button class="fb"    data-f="medium">Medium</button>
        <button class="fb"    data-f="hard">Hard</button>
      </div>
    </div>
    <div class="qlist" id="qlist"></div>
  </div>

  <!-- PANEL -->
  <div class="panel">
    <div class="ptabs" id="ptabs" style="display:none">
      <div class="ptab on" data-tab="desc">Description</div>
      <div class="ptab"    data-tab="sol">Solution</div>
    </div>
    <div class="pbody" id="pbody">
      <div class="empty">
        <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/>
        </svg>
        <p>Select a question to get started</p>
      </div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <div class="ft-left">Built by <span>Swapnasubham Das</span> &nbsp;·&nbsp; 50 SQL Problems</div>
  <div class="ft-right">&copy; 2026 Swapnasubham Das &nbsp;·&nbsp; All rights reserved</div>
</footer>

<!-- JavaScript Modules -->
<script type="module" src="js/app.js"></script>

</body>
</html>
